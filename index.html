<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Learning Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Title Bar -->
        <div class="title-bar">
            <div class="title-bar-drag-region">
                <span class="app-title">Language Learning Assistant</span>
            </div>
            <div class="title-bar-controls">
                <button class="title-bar-button" id="minimize-btn" title="Minimize">
                    <svg width="12" height="12" viewBox="0 0 12 12">
                        <rect x="0" y="5" width="12" height="2" fill="currentColor"/>
                    </svg>
                </button>
                <button class="title-bar-button" id="maximize-btn" title="Maximize">
                    <svg width="12" height="12" viewBox="0 0 12 12">
                        <rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="1.5" fill="none"/>
                    </svg>
                </button>
                <button class="title-bar-button close" id="close-btn" title="Close">
                    <svg width="12" height="12" viewBox="0 0 12 12">
                        <path d="M1 1 L11 11 M11 1 L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Control Panel -->
            <div class="control-panel">
                <div class="control-group">
                    <label for="device-select">Audio Device</label>
                    <div class="select-wrapper">
                        <select id="device-select" class="styled-select">
                            <option value="">Loading devices...</option>
                        </select>
                        <button id="refresh-devices" class="icon-button" title="Refresh Devices">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor">
                                <path d="M13.5 2.5 C12.8 1.8 11.9 1.3 11 1.1 M2.5 13.5 C3.2 14.2 4.1 14.7 5 14.9 M14.9 5 C14.7 4.1 14.2 3.2 13.5 2.5 M1.1 11 C1.3 11.9 1.8 12.8 2.5 13.5" stroke-width="1.5" stroke-linecap="round"/>
                                <path d="M14.9 5 L11 5 L11 1.1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M1.1 11 L5 11 L5 14.9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="control-group">
                    <label for="language-select">Language</label>
                    <select id="language-select" class="styled-select">
                        <option value="auto">Auto</option>
                        <option value="zh">Chinese</option>
                        <option value="en">English</option>
                        <option value="yue">Cantonese</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                    </select>
                    <span id="detected-lang" class="detected-lang">Detected: auto</span>
                </div>

                <div class="control-group">
                    <label for="volume-threshold">Volume Threshold</label>
                    <div class="slider-wrapper">
                        <input type="range" id="volume-threshold" min="0" max="0.1" step="0.0001" value="0.0001" class="slider">
                        <span id="threshold-value" class="threshold-value">0.0001</span>
                    </div>
                </div>

                <div class="button-group">
                    <button id="start-btn" class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <circle cx="8" cy="8" r="6" fill="currentColor"/>
                        </svg>
                        Start Capturing
                    </button>
                    <button id="stop-btn" class="btn btn-secondary" disabled>
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <rect x="4" y="4" width="8" height="8" fill="currentColor"/>
                        </svg>
                        Stop Capturing
                    </button>
                    <span id="status" class="status status-ready">Ready</span>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area">
                <div class="text-panel left-panel">
                    <div class="panel-header">
                        <h2>Original Transcription</h2>
                    </div>
                    <div id="transcription-text" class="text-content"></div>
                </div>

                <div class="text-panel right-panel">
                    <div class="panel-header">
                        <h2>English Translation</h2>
                    </div>
                    <div id="translation-text" class="text-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
